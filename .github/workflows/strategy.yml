name: Crypto Strategy Bot - BTC Only

on:
  schedule:
    # 北京时间每天 8:00-24:00 每小时执行一次
    # UTC 时间：0:00 - 16:00 每小时整点执行
    - cron: '0 0-16 * * *'
  workflow_dispatch:   # 保留手动触发，方便测试

jobs:
  generate-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行策略生成 (BTC)
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          GLASSNODE_API_KEY: ${{ secrets.GLASSNODE_API_KEY }}
          STRATEGY_SYMBOL: BTC
        run: python main.py
